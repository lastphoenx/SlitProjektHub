app_name: "SlitProjektHub"
paths:
  base_dir: "."
  data_dir: "data"
  db_dir: "data/db"
  rag_dir: "data/rag"
  backups_dir: "backups"
database:
  url: "sqlite:///data/db/slitproj.db"
ui:
  title: "SlitProjektHub"
