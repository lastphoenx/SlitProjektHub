app_name: "SlitProjektHub"
paths:
  base_dir: "."
  data_dir: "data"
  db_dir: "data/db"
  rag_dir: "data/rag"
  backups_dir: "backups"
database:
  url: "sqlite:///data/db/slitproj.db"
  # WAL-Modus: verbessert Concurrent-Reads bei mehreren gleichzeitigen Nutzern.
  # Zum Deaktivieren: auf false setzen (oder diese Zeile entfernen).
  # Erzeugt zusätzliche Dateien: slitproj.db-wal und slitproj.db-shm (normal, kein Fehler).
  wal_mode: true
ui:
  title: "SlitProjektHub"
  sidebar_title: "Navigation"

llm_defaults:
  provider: "anthropic"
  model: "sonnet"
  temperature: 0.7
  rag_top_k: 5
  rag_chunk_size: 1000
  rag_similarity_threshold: 0.5
  rag_enabled: true
