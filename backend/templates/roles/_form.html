<!-- Drawer backdrop -->
<div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawer()"></div>

<!-- Drawer panel -->
<div class="drawer drawer-wide" id="main-drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">

  <!-- Fixed header -->
  <div class="drawer-header">
    <h2 class="drawer-title" id="drawer-title">
      {% if role %}Rolle bearbeiten{% else %}Neue Rolle{% endif %}
    </h2>
    <div class="flex items-center gap-2">
      {% if role %}
        <span class="badge badge-neutral font-mono" style="font-size:.75rem">{{ role.key }}</span>
      {% endif %}
      <button class="btn btn-ghost btn-icon" onclick="closeDrawer()" title="Schließen">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <!-- Scrollable body -->
  <div class="drawer-body">
    <form
      id="role-form"
      {% if role %}
        hx-put="/roles/{{ role.key }}"
      {% else %}
        hx-post="/roles"
      {% endif %}
      hx-target="#roles-table"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful) closeDrawer()"
    >

      <div class="drawer-cols">

        <!-- Left: Core metadata -->
        <div class="drawer-cols-meta">

          <div class="form-group">
            <label class="form-label" for="r-title">Rollenbezeichnung *</label>
            <input id="r-title" class="form-input" type="text" name="title" required
                   value="{{ role.title if role else '' }}"
                   placeholder="z. B. Projektleiter:in Digitalisierung" autofocus />
          </div>

          <div class="form-group">
            <label class="form-label" for="r-short-code">Kürzel / Funktion</label>
            <input id="r-short-code" class="form-input font-mono" type="text" name="short_code" maxlength="14"
                   list="sc-suggestions"
                   value="{{ role.short_code if role else '' }}"
                   placeholder="z. B. PL-DIG"
                   style="text-transform:uppercase"
                   oninput="this.value=this.value.toUpperCase()" />
            <datalist id="sc-suggestions">
              {% for s in suggestions %}
                <option value="{{ s }}">
              {% endfor %}
            </datalist>
          </div>

          <div class="form-group">
            <label class="form-label" for="r-description">Kurzbeschreibung</label>
            <textarea id="r-description" class="form-textarea" name="description" rows="3"
                      placeholder="1-2 Sätze zur Rolle …">{{ role.description if role else '' }}</textarea>
          </div>

          <div class="form-group" style="flex:1">
            <label class="form-label" for="r-responsibilities">Hauptverantwortlichkeiten</label>
            <textarea id="r-responsibilities" class="form-textarea" name="responsibilities"
                      style="min-height:120px;resize:vertical"
                      placeholder="- Verantwortlichkeit 1&#10;- Verantwortlichkeit 2">{{ role.responsibilities if role else '' }}</textarea>
          </div>

          <div class="form-group">
            <label class="form-label" for="r-qualifications">Qualifikationen</label>
            <textarea id="r-qualifications" class="form-textarea" name="qualifications" rows="3"
                      placeholder="Anforderungen …">{{ role.qualifications if role else '' }}</textarea>
          </div>

          <div class="form-group">
            <label class="form-label" for="r-expertise">Expertise / Spezialwissen</label>
            <textarea id="r-expertise" class="form-textarea" name="expertise" rows="3"
                      placeholder="Spezifisches Fachwissen …">{{ role.expertise if role else '' }}</textarea>
          </div>

        </div><!-- /left -->

        <!-- Right: Full Markdown editor -->
        <div class="drawer-cols-editor">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.35rem">
            <label class="form-label" for="r-body" style="margin:0">Detailbeschreibung (Markdown)</label>
            <span class="text-muted" style="font-size:.75rem">Markdown unterstützt</span>
          </div>
          <textarea
            id="r-body"
            class="form-textarea editor-fill font-mono"
            name="body_text"
            placeholder="# Rollenbezeichnung&#10;&#10;## Aufgaben&#10;Beschreibe die Aufgaben hier …&#10;&#10;## Anforderungen&#10;- Punkt 1&#10;- Punkt 2"
            style="font-size:.82rem;line-height:1.6;tab-size:2"
          >{{ body_text or '' }}</textarea>
        </div><!-- /right -->

      </div><!-- /drawer-cols -->

    </form>
  </div><!-- /drawer-body -->

  <!-- Fixed footer -->
  <div class="drawer-footer">
    <button type="button" class="btn btn-secondary" onclick="closeDrawer()">
      Abbrechen
    </button>
    <button type="submit" form="role-form" class="btn btn-primary">
      <span class="htmx-indicator">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
      </span>
      {% if role %}Speichern{% else %}Erstellen{% endif %}
    </button>
  </div>

</div><!-- /drawer -->

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<script>
  requestAnimationFrame(() => {
    document.getElementById('main-drawer').classList.add('drawer-open');
  });
  function closeDrawer() {
    const d = document.getElementById('main-drawer');
    if (d) d.classList.remove('drawer-open');
    setTimeout(() => document.getElementById('modal-slot').innerHTML = '', 300);
  }
</script>
