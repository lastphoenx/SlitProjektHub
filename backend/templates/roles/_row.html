<tr id="role-row-{{ r.key }}"
    x-show="!$store.ui.q || '{{ r.title }} {{ r.short_code }} {{ r.description }}'.toLowerCase().includes($store.ui.q.toLowerCase())"
    x-cloak>
  <td><span class="badge badge-neutral font-mono">{{ r.short_code or "—" }}</span></td>
  <td style="font-weight:600">{{ r.title }}</td>
  <td class="truncate text-muted" style="max-width:240px">{{ r.description or "—" }}</td>
  <td class="truncate text-muted" style="max-width:220px">{{ r.responsibilities or "—" }}</td>
  <td>
    {% if r.rag_status == "indexed" %}
      <span class="badge" style="background:rgba(34,197,94,.12);color:#4ade80;border-color:rgba(34,197,94,.25)">✓ indexiert</span>
    {% elif r.rag_status == "pending" %}
      <span class="badge badge-neutral">ausstehend</span>
    {% elif r.rag_status == "failed" %}
      <span class="badge" style="background:rgba(239,68,68,.12);color:#f87171;border-color:rgba(239,68,68,.25)">Fehler</span>
    {% else %}
      <span class="text-muted" style="font-size:.8rem">—</span>
    {% endif %}
  </td>
  <td>
    <div class="flex items-center gap-1">
      <button
        class="btn btn-ghost btn-sm btn-icon"
        title="Bearbeiten"
        hx-get="/roles/{{ r.key }}/edit"
        hx-target="#modal-slot"
        hx-swap="innerHTML"
      >
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button
        class="btn btn-ghost btn-sm btn-icon"
        title="Löschen"
        style="color:var(--color-danger)"
        hx-get="/roles/{{ r.key }}/confirm-delete"
        hx-target="#modal-slot"
        hx-swap="innerHTML"
      >
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
  </td>
</tr>
