<!-- Drawer backdrop -->
<div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawer()"></div>

<!-- Drawer panel -->
<div class="drawer drawer-wide" id="main-drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">

  <!-- Fixed header -->
  <div class="drawer-header">
    <h2 class="drawer-title" id="drawer-title">
      {% if project %}Projekt bearbeiten{% else %}Neues Projekt{% endif %}
    </h2>
    <div class="flex items-center gap-2">
      {% if project %}
        <span class="badge badge-neutral font-mono" style="font-size:.75rem">{{ project.key }}</span>
      {% endif %}
      <button class="btn btn-ghost btn-icon" onclick="closeDrawer()" title="Schließen">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <!-- Scrollable body -->
  <div class="drawer-body">
    <form
      id="project-form"
      {% if project %}
        hx-put="/projects/{{ project.key }}"
      {% else %}
        hx-post="/projects"
      {% endif %}
      hx-target="#projects-table"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful) closeDrawer()"
    >

      <div class="drawer-cols">

        <!-- Left: Metadata -->
        <div class="drawer-cols-meta">

          <div class="form-group">
            <label class="form-label" for="f-title">Projekttitel *</label>
            <input id="f-title" class="form-input" type="text" name="title" required
                   value="{{ project.title if project else '' }}"
                   placeholder="z. B. Digitalisierung HR-Prozesse" autofocus />
          </div>

          <div class="form-group">
            <label class="form-label" for="f-short-title">Kurztitel</label>
            <input id="f-short-title" class="form-input" type="text" name="short_title" maxlength="50"
                   value="{{ project.short_title if project else '' }}"
                   placeholder="max. 50 Zeichen" />
          </div>

          <div class="form-group">
            <label class="form-label" for="f-short-code">Kürzel</label>
            <input id="f-short-code" class="form-input font-mono" type="text" name="short_code" maxlength="14"
                   value="{{ project.short_code if project else '' }}"
                   placeholder="z. B. DIG-HR"
                   style="text-transform:uppercase"
                   oninput="this.value=this.value.toUpperCase()" />
          </div>

          <div class="form-group">
            <label class="form-label" for="f-type">Projekttyp</label>
            <select id="f-type" class="form-select" name="type">
              <option value="">— kein Typ —</option>
              {% for t in project_types %}
                <option value="{{ t }}" {% if project and project.type == t %}selected{% endif %}>{{ t }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-group" style="flex:1">
            <label class="form-label" for="f-description">Projektbeschreibung *</label>
            <textarea id="f-description" class="form-textarea" name="description" required
                      style="min-height:140px;resize:vertical"
                      placeholder="Kurze Beschreibung des Projekts (1-3 Sätze)">{{ project.description if project else '' }}</textarea>
          </div>

          <div style="margin-top:auto;padding-top:.5rem">
            <p class="text-muted" style="font-size:.75rem;line-height:1.5">
              Tipp: Der Markdown-Editor rechts unterstützt Überschriften, Listen, Codeblöcke und Fettschrift.
            </p>
          </div>

        </div><!-- /left -->

        <!-- Right: Markdown editor -->
        <div class="drawer-cols-editor">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.35rem">
            <label class="form-label" for="f-body" style="margin:0">Detailbeschreibung (Markdown)</label>
            <span class="text-muted" style="font-size:.75rem">Markdown unterstützt</span>
          </div>
          <textarea
            id="f-body"
            class="form-textarea editor-fill font-mono"
            name="body_text"
            placeholder="# Projekttitel&#10;&#10;## Ziel&#10;Beschreibe das Projektziel hier …&#10;&#10;## Scope&#10;- Punkt 1&#10;- Punkt 2"
            style="font-size:.82rem;line-height:1.6;tab-size:2"
          >{{ body_text or '' }}</textarea>
        </div><!-- /right -->

      </div><!-- /drawer-cols -->

    </form>
  </div><!-- /drawer-body -->

  <!-- Fixed footer -->
  <div class="drawer-footer">
    <button type="button" class="btn btn-secondary" onclick="closeDrawer()">
      Abbrechen
    </button>
    <button type="submit" form="project-form" class="btn btn-primary">
      <span class="htmx-indicator">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
      </span>
      {% if project %}Speichern{% else %}Erstellen{% endif %}
    </button>
  </div>

</div><!-- /drawer -->

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<script>
  // Animate in after DOM insert
  requestAnimationFrame(() => {
    document.getElementById('main-drawer').classList.add('drawer-open');
  });
  function closeDrawer() {
    const d = document.getElementById('main-drawer');
    const b = document.getElementById('drawer-backdrop');
    if (d) d.classList.remove('drawer-open');
    setTimeout(() => document.getElementById('modal-slot').innerHTML = '', 300);
  }
</script>
