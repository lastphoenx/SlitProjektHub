<div class="modal-backdrop" id="project-form-backdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">
        {% if project %}Projekt bearbeiten{% else %}Neues Projekt{% endif %}
      </h2>
      <button
        class="btn btn-ghost btn-icon"
        onclick="document.getElementById('modal-slot').innerHTML=''"
        title="Schließen"
      >
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <form
      {% if project %}
        hx-put="/projects/{{ project.key }}"
      {% else %}
        hx-post="/projects"
      {% endif %}
      hx-target="#projects-table"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful) document.getElementById('modal-slot').innerHTML=''"
    >

      <div class="form-group">
        <label class="form-label" for="f-title">Projekttitel *</label>
        <input id="f-title" class="form-input" type="text" name="title" required
               value="{{ project.title if project else '' }}"
               placeholder="z. B. Digitalisierung HR-Prozesse" autofocus />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="f-short-title">Kurztitel</label>
          <input id="f-short-title" class="form-input" type="text" name="short_title" maxlength="50"
                 value="{{ project.short_title if project else '' }}"
                 placeholder="max. 50 Zeichen" />
        </div>
        <div class="form-group">
          <label class="form-label" for="f-short-code">Kürzel</label>
          <input id="f-short-code" class="form-input font-mono" type="text" name="short_code" maxlength="14"
                 value="{{ project.short_code if project else '' }}"
                 placeholder="z. B. DIG-HR" style="text-transform:uppercase"
                 oninput="this.value=this.value.toUpperCase()" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="f-type">Projekttyp</label>
        <select id="f-type" class="form-select" name="type">
          <option value="">— kein Typ —</option>
          {% for t in project_types %}
            <option value="{{ t }}" {% if project and project.type == t %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="f-description">Projektbeschreibung *</label>
        <textarea id="f-description" class="form-textarea" name="description" required
                  placeholder="Kurze Beschreibung des Projekts (1-3 Sätze)">{{ project.description if project else '' }}</textarea>
      </div>

      <div class="form-group">
        <label class="form-label" for="f-body">Detailbeschreibung (Markdown)</label>
        <textarea id="f-body" class="form-textarea" name="body_text" rows="6"
                  placeholder="Ausführliche Projektbeschreibung in Markdown...">{{ body_text or '' }}</textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary"
                onclick="document.getElementById('modal-slot').innerHTML=''">
          Abbrechen
        </button>
        <button type="submit" class="btn btn-primary">
          <span class="htmx-indicator">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
          </span>
          {% if project %}Speichern{% else %}Erstellen{% endif %}
        </button>
      </div>

    </form>
  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>
