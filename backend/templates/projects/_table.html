{% if projects %}
<table>
  <thead>
    <tr>
      <th>Kürzel</th>
      <th>Titel</th>
      <th>Typ</th>
      <th>Beschreibung</th>
      <th style="width:120px">Aktionen</th>
    </tr>
  </thead>
  <tbody id="projects-tbody">
    {% for p in projects %}
      {% include "projects/_row.html" %}
    {% endfor %}
  </tbody>
</table>
{% else %}
<div class="empty-state">
  <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h3l2 2h9a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
  <p style="font-size:1rem;font-weight:600;margin-bottom:.25rem">Noch keine Projekte</p>
  <p>Klicke auf „Neues Projekt", um loszulegen.</p>
</div>
{% endif %}
