<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}SlitProjektHub{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css" />
  <!-- HTMX: Server-driven partial updates -->
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js" defer></script>
  <!-- Alpine.js: lightweight client-side reactivity -->
  <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  <style>[x-cloak]{display:none!important}</style>
</head>
<body>

<div class="app-shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">⚡ SlitProjektHub</div>

    <a href="/dashboard" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>

    <a href="/projects" class="nav-item {% if active_page == 'projects' %}active{% endif %}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h3l2 2h9a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
      Projekte
    </a>

    <a href="/roles" class="nav-item {% if active_page == 'roles' %}active{% endif %}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Rollen
    </a>

    <a href="/tasks" class="nav-item {% if active_page == 'tasks' %}active{% endif %}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Aufgaben
    </a>

    <a href="/contexts" class="nav-item {% if active_page == 'contexts' %}active{% endif %}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
      Kontexte
    </a>

    <a href="/chat" class="nav-item {% if active_page == 'chat' %}active{% endif %}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Chat / RAG
    </a>

    <div style="flex:1"></div>

    <a href="/settings" class="nav-item {% if active_page == 'settings' %}active{% endif %}">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      KI-Einstellungen
    </a>

    <a href="http://localhost:8000/docs" target="_blank" class="nav-item" style="font-size:0.75rem">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      API Docs
    </a>
  </aside>

  <!-- ── Main ── -->
  <div class="main">
    <header class="topbar">
      <span class="topbar-title">{% block topbar_title %}{% endblock %}</span>
      <div class="flex items-center gap-2">
        {% block topbar_actions %}{% endblock %}
      </div>
    </header>

    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>

</div>

<!-- Toast container for HTMX feedback -->
<div id="toast-container"></div>

<script>
// HTMX: nach jedem Request ggf. Toast anzeigen
document.addEventListener('htmx:afterRequest', function(evt) {
  const header = evt.detail.xhr.getResponseHeader('HX-Toast');
  if (header) {
    const data = JSON.parse(header);
    showToast(data.message, data.type || 'success');
  }
});

function showToast(msg, type = 'success') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'error' ? ' toast-error' : '');
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Alpine global helper
document.addEventListener('alpine:init', () => {
  Alpine.store('ui', { modalOpen: false, q: '' });
});
</script>

{% block extra_scripts %}{% endblock %}
</body>
</html>
