<tr id="task-row-{{ t.key }}"
    x-data
    x-show="(!$store.tasks.q || ('{{ t.title }} {{ t.short_code }} {{ t.description }}'.toLowerCase().includes($store.tasks.q.toLowerCase()))) && (!$store.tasks.role || '{{ t.source_role_key }}' === $store.tasks.role)"
    x-cloak>
  <td><span class="badge badge-neutral font-mono">{{ t.short_code or "—" }}</span></td>
  <td>
    <span style="font-weight:500">{{ t.title }}</span>
    {% if t.short_title and t.short_title != t.title %}
      <div class="text-muted" style="font-size:.78rem;margin-top:.1rem">{{ t.short_title }}</div>
    {% endif %}
  </td>
  <td class="truncate text-muted" style="max-width:260px">{{ t.description or "—" }}</td>
  <td>
    {% if t.source_role_key %}
      <button
        class="btn btn-ghost btn-sm"
        style="padding:.2rem .5rem;font-size:.78rem"
        hx-get="/tasks/new?role_key={{ t.source_role_key }}"
        hx-target="#modal-slot"
        hx-swap="innerHTML"
        title="Neue Aufgabe für diese Rolle"
      >
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        {{ t.source_role_key | truncate(22, true, "...") }}
      </button>
    {% else %}
      <span class="text-muted" style="font-size:.8rem">—</span>
    {% endif %}
  </td>
  <td>
    <div class="flex items-center gap-1">
      <button
        class="btn btn-ghost btn-sm btn-icon"
        title="Bearbeiten"
        hx-get="/tasks/{{ t.key }}/edit"
        hx-target="#modal-slot"
        hx-swap="innerHTML"
      >
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button
        class="btn btn-ghost btn-sm btn-icon"
        title="Löschen"
        style="color:var(--color-danger)"
        hx-get="/tasks/{{ t.key }}/confirm-delete"
        hx-target="#modal-slot"
        hx-swap="innerHTML"
      >
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
  </td>
</tr>
