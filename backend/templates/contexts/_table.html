{% if contexts %}
<table>
  <thead>
    <tr>
      <th style="width:100px">Kürzel</th>
      <th>Titel</th>
      <th>Beschreibung</th>
      <th style="width:90px">Aktionen</th>
    </tr>
  </thead>
  <tbody>
    {% for c in contexts %}
      {% include "contexts/_row.html" %}
    {% endfor %}
  </tbody>
</table>
{% else %}
<div class="empty-state">
  <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
  <p style="font-size:1rem;font-weight:600;margin-bottom:.25rem">Noch keine Kontexte</p>
  <p>Klicke auf „Neuer Kontext", um loszulegen.</p>
</div>
{% endif %}
