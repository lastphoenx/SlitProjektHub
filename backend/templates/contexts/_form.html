<!-- Drawer backdrop -->
<div class="drawer-backdrop" id="drawer-backdrop" onclick="closeDrawer()"></div>

<!-- Drawer panel -->
<div class="drawer drawer-wide" id="main-drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">

  <!-- Fixed header -->
  <div class="drawer-header">
    <h2 class="drawer-title" id="drawer-title">
      {% if context %}Kontext bearbeiten{% else %}Neuer Kontext{% endif %}
    </h2>
    <div class="flex items-center gap-2">
      {% if context %}
        <span class="badge badge-neutral font-mono" style="font-size:.75rem">{{ context.key }}</span>
      {% endif %}
      <button class="btn btn-ghost btn-icon" onclick="closeDrawer()" title="Schließen">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <!-- Scrollable body -->
  <div class="drawer-body">
    <form
      id="context-form"
      {% if context %}
        hx-put="/contexts/{{ context.key }}"
      {% else %}
        hx-post="/contexts"
      {% endif %}
      hx-target="#contexts-table"
      hx-swap="innerHTML"
      hx-on::after-request="if(event.detail.successful) closeDrawer()"
    >

      <div class="drawer-cols">

        <!-- Left: Core metadata -->
        <div class="drawer-cols-meta">

          <div class="form-group">
            <label class="form-label" for="c-title">Titel *</label>
            <input id="c-title" class="form-input" type="text" name="title" required
                   value="{{ context.title if context else '' }}"
                   placeholder="z. B. Digitalisierungsstrategie 2025" autofocus />
          </div>

          <div class="form-group">
            <label class="form-label" for="c-short-title">Kurztitel</label>
            <input id="c-short-title" class="form-input" type="text" name="short_title" maxlength="50"
                   value="{{ context.short_title if context else '' }}"
                   placeholder="Kompakter Alternativtitel (max. 50 Zeichen)" />
          </div>

          <div class="form-group">
            <label class="form-label" for="c-short-code">Kürzel</label>
            <input id="c-short-code" class="form-input font-mono" type="text" name="short_code" maxlength="14"
                   value="{{ context.short_code if context else '' }}"
                   placeholder="z. B. DIGI-25"
                   style="text-transform:uppercase"
                   oninput="this.value=this.value.toUpperCase()" />
          </div>

          <div class="form-group" style="flex:1">
            <label class="form-label" for="c-description">Beschreibung</label>
            <textarea id="c-description" class="form-textarea" name="description"
                      style="min-height:140px;resize:vertical"
                      placeholder="Worum geht es? Welche Relevanz hat das Dokument?">{{ context.description if context else '' }}</textarea>
          </div>

        </div><!-- /left -->

        <!-- Right: Full Markdown editor -->
        <div class="drawer-cols-editor">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.35rem">
            <label class="form-label" for="c-body" style="margin:0">Inhalt (Markdown)</label>
            <span class="text-muted" style="font-size:.75rem">Markdown unterstützt</span>
          </div>
          <textarea
            id="c-body"
            class="form-textarea editor-fill font-mono"
            name="body_text"
            placeholder="# Titel&#10;&#10;## Zusammenfassung&#10;Kurze Zusammenfassung des Dokuments …&#10;&#10;## Details&#10;Weiterer Inhalt …"
            style="font-size:.82rem;line-height:1.6;tab-size:2"
          >{{ body_text or '' }}</textarea>
        </div><!-- /right -->

      </div><!-- /drawer-cols -->

    </form>
  </div><!-- /drawer-body -->

  <!-- Fixed footer -->
  <div class="drawer-footer">
    <button type="button" class="btn btn-secondary" onclick="closeDrawer()">
      Abbrechen
    </button>
    <button type="submit" form="context-form" class="btn btn-primary">
      <span class="htmx-indicator">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
      </span>
      {% if context %}Speichern{% else %}Erstellen{% endif %}
    </button>
  </div>

</div><!-- /drawer -->

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<script>
  requestAnimationFrame(() => {
    document.getElementById('main-drawer').classList.add('drawer-open');
  });
  function closeDrawer() {
    const d = document.getElementById('main-drawer');
    if (d) d.classList.remove('drawer-open');
    setTimeout(() => document.getElementById('modal-slot').innerHTML = '', 300);
  }
</script>
