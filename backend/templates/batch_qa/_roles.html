{% if roles %}
<div style="display:flex;flex-direction:column;gap:.4rem;max-height:220px;overflow-y:auto;padding:.25rem 0">
  {% for r in roles %}
  <label class="bqa-rl" style="display:flex;align-items:center;gap:.55rem;padding:.35rem .6rem;border:1px solid var(--color-border);border-radius:.375rem;cursor:pointer;font-size:.85rem"
         onmouseover="this.style.background='var(--color-surface-2)'" onmouseout="this.style.background=''">
    <input type="checkbox" class="bqa-rcb" name="role_keys" value="{{ r.key }}" checked
           style="accent-color:var(--color-primary);flex-shrink:0">
    <span>
      <strong>{{ r.title }}</strong>
      {% if r.description %}
      <span style="color:var(--color-text-muted);font-size:.78rem;display:block;line-height:1.3">{{ r.description[:80] }}{% if r.description|length > 80 %}…{% endif %}</span>
      {% endif %}
    </span>
  </label>
  {% endfor %}
</div>
<div style="font-size:.75rem;color:var(--color-text-muted);margin-top:.35rem">
  {{ roles|length }} Rolle{% if roles|length != 1 %}n{% endif %} verfügbar
</div>
{% else %}
<p style="font-size:.82rem;color:var(--color-text-muted)">Keine Rollen in diesem Projekt.</p>
{% endif %}
