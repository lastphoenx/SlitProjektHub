{% extends "base.html" %}

{% block content %}
<div
  x-data="{
    provider: '{{ sel_provider }}',
    model: '{{ sel_model }}',
    temperature: {{ temperature | default(0.7) }},
    rag: {{ 'true' if rag_enabled | default(true) else 'false' }},
    allModels: {{ all_models_json | safe }},
    get models() { return this.allModels[this.provider] || [] }
  }"
  style="display:flex;flex-direction:column;height:calc(100vh - 2rem)"
>

  <!-- Toolbar -->
  <div class="page-header" style="flex-shrink:0;padding-bottom:.75rem;gap:.75rem;flex-wrap:wrap;align-items:flex-end">
    <div>
      <h1 class="page-title">Chat</h1>
      <p class="page-subtitle">KI-gestützte Konversation im Projekt-Kontext</p>
    </div>

    <!-- Controls -->
    <div style="display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end;margin-left:auto">

      <!-- Project -->
      <div>
        <label style="font-size:.72rem;color:var(--color-text-muted);display:block;margin-bottom:.2rem">Projekt</label>
        <select id="sel-project" name="project_key" class="form-select" style="min-width:180px"
                hx-get="/chat/history"
                hx-trigger="change"
                hx-include="#sel-project,#sel-provider"
                hx-target="#chat-messages"
                hx-swap="innerHTML">
          {% for p in projects %}
            <option value="{{ p.key }}" {% if p.key == sel_project %}selected{% endif %}>{{ p.title }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Provider -->
      <div>
        <label style="font-size:.72rem;color:var(--color-text-muted);display:block;margin-bottom:.2rem">Provider</label>
        <select id="sel-provider" name="provider" class="form-select"
                x-model="provider"
                @change="model = models[0] || ''"
                hx-get="/chat/history"
                hx-trigger="change"
                hx-include="#sel-project,#sel-provider"
                hx-target="#chat-messages"
                hx-swap="innerHTML">
          {% for pv in providers %}
            <option value="{{ pv }}" {% if pv == sel_provider %}selected{% endif %}>{{ pv }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Model -->
      <div>
        <label style="font-size:.72rem;color:var(--color-text-muted);display:block;margin-bottom:.2rem">Modell</label>
        <select id="sel-model" name="model" class="form-select" x-model="model">
          <template x-for="m in models" :key="m">
            <option :value="m" x-text="m"></option>
          </template>
        </select>
      </div>

      <!-- Temperature -->
      <div>
        <label style="font-size:.72rem;color:var(--color-text-muted);display:block;margin-bottom:.2rem">
          Temp: <span x-text="temperature.toFixed(1)"></span>
        </label>
        <input type="range" min="0" max="1" step="0.1" x-model.number="temperature"
               style="width:90px;vertical-align:middle" />
      </div>

      <!-- RAG toggle -->
      <div style="display:flex;align-items:center;gap:.4rem;padding-bottom:.15rem">
        <label style="font-size:.72rem;color:var(--color-text-muted)">RAG</label>
        <div style="position:relative;display:inline-block;width:36px;height:20px">
          <input type="checkbox" x-model="rag" id="rag-toggle" style="opacity:0;width:0;height:0">
          <label for="rag-toggle" @click="rag=!rag" :style="'position:absolute;cursor:pointer;inset:0;border-radius:20px;background:'+( rag ? 'var(--color-primary)' : 'var(--color-border)')+';transition:.25s'">
            <span :style="'position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;transition:.25s;left:'+(rag?'19px':'3px')"></span>
          </label>
        </div>
      </div>

      <!-- New session -->
      <button class="btn btn-secondary btn-sm"
              style="padding:.35rem .6rem"
              title="Neue Sitzung starten"
              @click="
                document.getElementById('active-session-id').value = crypto.randomUUID();
                document.getElementById('chat-messages').innerHTML = '<p class=\'text-muted\' style=\'padding:2rem;text-align:center\'>Neue Sitzung gestartet.</p>';
              ">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Neue Sitzung
      </button>

      <!-- Hide session -->
      <button class="btn btn-secondary btn-sm"
              style="padding:.35rem .6rem"
              title="Verlauf ausblenden (bleibt in DB)"
              hx-post="/chat/session/hide"
              hx-include="#sel-provider,#active-session-id"
              hx-target="#chat-messages"
              hx-swap="innerHTML"
              hx-confirm="Verlauf ausblenden?">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        Ausblenden
      </button>

      <!-- Purge session -->
      <button class="btn btn-secondary btn-sm"
              style="padding:.35rem .6rem;color:var(--color-danger)"
              title="Verlauf endgültig löschen"
              hx-post="/chat/session/purge"
              hx-include="#sel-provider,#active-session-id"
              hx-target="#chat-messages"
              hx-swap="innerHTML"
              hx-confirm="Verlauf endgültig löschen? Diese Aktion kann nicht rückgängig gemacht werden.">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Löschen
      </button>
    </div>
  </div>

  <!-- Chat area -->
  <div id="chat-messages"
       style="flex:1;overflow-y:auto;padding:.75rem 0;display:flex;flex-direction:column;gap:.75rem"
       hx-get="/chat/history"
       hx-trigger="load"
       hx-include="#sel-project,#sel-provider"
       hx-swap="innerHTML">
    <p class="text-muted" style="text-align:center;padding:2rem">Lade Chat-Verlauf …</p>
  </div>

  <!-- hidden session id (updated by OOB from /chat/history) -->
  <input type="hidden" id="active-session-id" name="session_id" value="{{ session_id }}">

  <!-- Input form -->
  <div style="flex-shrink:0;border-top:1px solid var(--color-border);padding-top:.75rem">
    <form id="chat-form"
          hx-post="/chat/send"
          hx-target="#chat-messages"
          hx-swap="beforeend"
          hx-include="#sel-project,#sel-provider,#sel-model,#active-session-id"
          hx-indicator="#send-indicator"
          hx-on::after-request="if(event.detail.successful){ this.querySelector('textarea').value=''; scrollToBottom(); }"
          style="display:flex;gap:.5rem;align-items:flex-end">

      <!-- Dynamic hidden fields -->
      <input type="hidden" name="temperature" :value="temperature">
      <input type="hidden" name="rag_enabled" :value="rag">

      <textarea
        name="message"
        class="form-textarea"
        style="flex:1;min-height:56px;max-height:180px;resize:none;font-size:.9rem"
        placeholder="Nachricht eingeben … (Strg+Enter zum Senden)"
        @keydown.ctrl.enter.prevent="document.getElementById('chat-form').requestSubmit()"
        autofocus
      ></textarea>

      <button type="submit" id="send-btn" class="btn btn-primary" style="height:56px;min-width:80px">
        <span id="send-indicator" class="htmx-indicator" style="display:none">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
        </span>
        <span>
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Senden
        </span>
      </button>
    </form>
  </div>

</div>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
  .htmx-request #send-indicator { display:inline !important; }
  .htmx-request #send-btn > span:last-child { display:none; }
  .chat-bubble { padding:.6rem .9rem; border-radius:.6rem; max-width:90%; word-break:break-word; }
  .chat-bubble-user { background:var(--color-primary); color:#fff; align-self:flex-end; }
  .chat-bubble-ai { background:var(--color-surface-2); border:1px solid var(--color-border); align-self:flex-start; }
  .chat-meta { font-size:.72rem; color:var(--color-text-muted); margin-top:.2rem; }
  .chat-rag-sources { font-size:.72rem; color:var(--color-text-muted); margin-top:.3rem; padding-top:.3rem; border-top:1px solid var(--color-border); }
</style>

<script>
  function scrollToBottom() {
    const el = document.getElementById('chat-messages');
    if (el) el.scrollTop = el.scrollHeight;
  }
  // Scroll on initial load
  document.addEventListener('htmx:afterSwap', e => {
    if (e.target.id === 'chat-messages') scrollToBottom();
  });
</script>
{% endblock %}
