---
# Authelia Configuration for 2FA
# Place this in: ./authelia/configuration.yml

server:
  host: 0.0.0.0
  port: 9091

log:
  level: info

# Theme (light or dark)
theme: light

# JWT Secret (CHANGE THIS!)
jwt_secret: your-very-secure-random-jwt-secret-here-min-32-chars

# Default redirection URL
default_redirection_url: https://projekthub.mainedomain.com

# TOTP (Time-based One-Time Password)
totp:
  issuer: ProjektHub
  period: 30
  skew: 1

# Authentication backend
authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id
      iterations: 1
      salt_length: 16
      parallelism: 8
      memory: 64

# Access Control Rules
access_control:
  default_policy: deny
  rules:
    # Allow authenticated users to access projekthub
    - domain: projekthub.mainedomain.com
      policy: two_factor
    # Public access to auth page
    - domain: auth.mainedomain.com
      policy: bypass

# Session configuration
session:
  name: authelia_session
  secret: another-very-secure-random-session-secret-min-32-chars
  expiration: 1h
  inactivity: 5m
  remember_me_duration: 1M
  domain: mainedomain.com

  # Redis for session storage (optional, recommended for production)
  # redis:
  #   host: redis
  #   port: 6379

# Storage (users, 2FA devices, etc.)
storage:
  local:
    path: /config/db.sqlite3

# Notifier (for password reset, etc.)
notifier:
  # Option 1: File-based (for testing)
  filesystem:
    filename: /config/notification.txt
  
  # Option 2: SMTP (for production)
  # smtp:
  #   host: smtp.gmail.com
  #   port: 587
  #   username: your-email@gmail.com
  #   password: your-app-password
  #   sender: noreply@mainedomain.com
  #   subject: "[ProjektHub] {title}"
