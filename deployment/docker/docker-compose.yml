version: '3.8'

services:
  projekthub:
    build: .
    container_name: slit-projekthub
    ports:
      - "8501:8501"  # Streamlit Frontend
      - "8000:8000"  # FastAPI Backend
    volumes:
      # Persistent data storage
      - ./data:/app/data
      - ./config:/app/config
      # Optional: Mount custom .env file
      # - ./.env.docker:/app/.env
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_MAXUPLOADSIZE=200
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      # Optional: Set Python unbuffered output for better logging
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - projekthub-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  projekthub-net:
    driver: bridge
